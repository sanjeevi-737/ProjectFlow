version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: projflow-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: projflow
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-projflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projflow-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-projflow}:${MONGO_PASSWORD:-changeme}@mongodb:27017/projflow?authSource=admin
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173,https://project-flow-two-lilac.vercel.app
    volumes:
      - backend_uploads:/app/backend/uploads
    healthcheck:
      test: curl -f http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: projflow-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_uploads:
